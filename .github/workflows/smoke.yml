name: Depth Engine Smoke

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  smoke:
    name: Core and content smoke tests
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Run index startup contract smoke test
        run: node smoke_index_static_contract.mjs

      - name: Run example selection contract smoke test
        run: node smoke_example_selection_contract.mjs

      - name: Run core smoke test
        run: node smoke_depth_engine_core.mjs

      - name: Run save stage-cap contract smoke test
        run: node smoke_save_stage_cap_contract.mjs

      - name: Run save player-repair contract smoke test
        run: node smoke_save_player_repair_contract.mjs

      - name: Run save version compatibility contract smoke test
        run: node smoke_save_version_compatibility_contract.mjs

      - name: Run Rat Cellar content smoke test
        run: node smoke_rat_cellar_content.mjs

      - name: Run registered examples content smoke test
        run: node smoke_registered_examples_content.mjs

      - name: Run Depth Kit Lab content smoke test
        run: node smoke_depth_kit_lab_example.mjs

      - name: Run Crystal Mines documentation-proof smoke test
        run: node smoke_crystal_mines_example.mjs
