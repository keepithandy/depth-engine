name: Depth Engine Smoke

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  smoke:
    name: Full deterministic smoke suite
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Run full smoke suite
        run: node run_smokes.mjs
